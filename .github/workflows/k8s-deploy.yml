name: Deploy to local Kubernetes

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy-k8s:
    runs-on: self-hosted

    steps:
      - name: Check kubectl context
        shell: cmd
        run: |
          kubectl set image deployment/myapi-deployment myapi=h8a2n5k23/myapi:${{ github.ref_name }}

      - name: Restart deployment
        shell: cmd
        run: |
          kubectl rollout status deployment/myapi-deployment --timeout=120s